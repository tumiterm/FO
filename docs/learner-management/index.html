<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forek Online Facilitator Learner Journey</title>
  <style>
    :root{color-scheme:light;--orange:#e65100;--ink:#172033;--paper:#f4f6f9}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);font-family:Arial,sans-serif;color:var(--ink)}
    header{position:sticky;top:0;z-index:2;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 2rem;background:#fff;border-bottom:1px solid #dfe3ea;box-shadow:0 4px 18px #17203318}
    h1{font-size:1.15rem;margin:0}.actions{display:flex;flex-wrap:wrap;gap:.65rem}.button{display:inline-block;padding:.7rem 1rem;border-radius:.6rem;text-decoration:none;font-weight:700;border:1px solid var(--orange);color:var(--orange);background:#fff}.button.primary{background:var(--orange);color:#fff}.help{max-width:1800px;margin:1rem auto;padding:0 1rem;color:#596276}.poster{display:block;width:min(1800px,calc(100% - 2rem));height:auto;margin:1rem auto 3rem;background:#fff;box-shadow:0 12px 36px #17203320}
    @media print{header,.help{display:none}.poster{width:100%;margin:0;box-shadow:none}body{background:#fff}@page{size:A3 portrait;margin:8mm}}
  </style>
</head>
<body>
  <header>
    <h1>Forek Online — Facilitator Learner Journey</h1>
    <div class="actions">
      <a class="button primary" href="forek-learner-management-journey.svg" download>Download editable SVG</a>
      <button class="button" type="button" onclick="window.print()">Print / Save as PDF</button>
    </div>
  </header>
  <p class="help">This plain-language journey map is designed for facilitators, administrators, management and implementation teams. Download the SVG for presentations or use Print / Save as PDF for a shareable document.</p>
  <img class="poster" src="forek-learner-management-journey.svg" alt="End-to-end Forek Online facilitator learner management journey">
</body>
</html>
